name: "ReactJS build and Update Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: 
          - 18.x

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Install Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Run Build to C code
        run: python3 main.py

      - name: Get tag names
        id: tags
        run: echo ::set-output name=tags::$(git tag --sort version:refname)
      
      - name: Get commits between tags
        run: |
          tags=(${{ steps.tags.outputs.tags }})
          git log --pretty=format:%H ${tags[-1]}...${tags[-2]} > ${{ github.workspace }}-CHANGELOG.txt

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: ${{ github.workspace }}-CHANGELOG.txt
          name: "Cleaner Website ${{ github.ref_name }}"
          files: website.h
          token: ${{ secrets.TOKEN }}
